name: Publish to npm

# Fires on tag v*.*.*. Uses npm Trusted Publishing (no NPM_TOKEN
# secret required) — set up the trusted publisher relationship at
# npmjs.com/settings/prefixcheck/packages pointing at this repo +
# this workflow filename.

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish
        run: npm publish --provenance --access public
